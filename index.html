<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Online Stopwatch — Tabutility</title>
<meta name="description" content="Free online stopwatch with lap times. Start, stop, reset and record laps instantly in your browser."/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
  nav{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:16px}
  nav a{color:#94a3b8;text-decoration:none;font-size:14px}
  nav a:hover{color:#f1f5f9}
  nav .brand{color:#38bdf8;font-weight:700;font-size:18px}

</style>

<body>
<nav>
  <span class="brand">⚡ Tabutility</span>
  <a href="https://tabutility.com">← All Tools</a>
</nav>
<div class="ad-banner">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>
<div id="root"></div>
<script type="text/babel">
//<![CDATA[
const { useState, useEffect, useRef } = React;

function fmt(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function fmtLap(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

export default function Stopwatch() {
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [laps, setLaps] = useState([]);
  const startRef = useRef(null);
  const rafRef = useRef(null);
  const baseRef = useRef(0);

  useEffect(() => {
    if (running) {
      startRef.current = performance.now();
      const tick = () => {
        setElapsed(baseRef.current + (performance.now() - startRef.current));
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(rafRef.current);
      baseRef.current = elapsed;
    }
    return () => cancelAnimationFrame(rafRef.current);
  }, [running]);

  const start = () => setRunning(true);
  const stop = () => setRunning(false);
  const reset = () => { setRunning(false); setElapsed(0); baseRef.current = 0; setLaps([]); };
  const lap = () => {
    const lapTime = elapsed - (laps.reduce((a,l) => a + l.split, 0));
    setLaps(prev => [...prev, { total: elapsed, split: lapTime, num: prev.length + 1 }]);
  };

  const fastestSplit = laps.length > 1 ? Math.min(...laps.map(l => l.split)) : null;
  const slowestSplit = laps.length > 1 ? Math.max(...laps.map(l => l.split)) : null;

  return (
    <div style={{maxWidth:600,margin:'40px auto',padding:'0 20px'}}>
      <h1 style={{textAlign:'center',fontSize:28,fontWeight:700,marginBottom:8}}>Online Stopwatch</h1>
      <p style={{textAlign:'center',color:'#94a3b8',marginBottom:40}}>Lap timer · Runs in your browser · No install needed</p>

      <div style={{background:'#1e293b',borderRadius:20,padding:'40px 24px',textAlign:'center',border:'1px solid #334155',marginBottom:24}}>
        <div style={{fontFamily:'monospace',fontSize:72,fontWeight:300,letterSpacing:2,color:'#38bdf8',lineHeight:1,marginBottom:32}}>
          {fmt(elapsed)}
        </div>
        <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          {!running && elapsed === 0 && (
            <button onClick={start} style={{background:'#38bdf8',color:'#0f172a',border:'none',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Start</button>
          )}
          {running && (
            <>
              <button onClick={stop} style={{background:'#ef4444',color:'#fff',border:'none',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Stop</button>
              <button onClick={lap} style={{background:'#334155',color:'#f1f5f9',border:'none',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Lap</button>
            </>
          )}
          {!running && elapsed > 0 && (
            <>
              <button onClick={start} style={{background:'#22c55e',color:'#fff',border:'none',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Resume</button>
              <button onClick={lap} style={{background:'#334155',color:'#f1f5f9',border:'none',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Lap</button>
              <button onClick={reset} style={{background:'#1e293b',color:'#94a3b8',border:'1px solid #334155',borderRadius:12,padding:'14px 36px',fontSize:18,fontWeight:700,cursor:'pointer'}}>Reset</button>
            </>
          )}
        </div>
      </div>

      {laps.length > 0 && (
        <div style={{background:'#1e293b',borderRadius:16,border:'1px solid #334155',overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid #334155',display:'flex',justifyContent:'space-between',fontSize:13,color:'#64748b',fontWeight:600}}>
            <span>LAP</span><span>SPLIT</span><span>TOTAL</span>
          </div>
          {[...laps].reverse().map(l => {
            const isFastest = fastestSplit !== null && l.split === fastestSplit;
            const isSlowest = slowestSplit !== null && l.split === slowestSplit;
            return (
              <div key={l.num} style={{padding:'14px 20px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:16,background: isFastest ? '#052e16' : isSlowest ? '#2d1515' : 'transparent', color: isFastest ? '#22c55e' : isSlowest ? '#ef4444' : '#f1f5f9'}}>
                <span>#{String(l.num).padStart(2,'0')}</span>
                <span>{fmtLap(l.split)}</span>
                <span>{fmtLap(l.total)}</span>
              </div>
            );
          })}
        </div>
      )}

      <div style={{background:'#1e293b',borderRadius:16,padding:20,marginTop:24,border:'1px solid #334155'}}>
        <h2 style={{fontSize:16,fontWeight:600,marginBottom:8}}>About this stopwatch</h2>
        <p style={{fontSize:14,color:'#94a3b8',lineHeight:1.6}}>Uses <code style={{background:'#0f172a',padding:'1px 4px',borderRadius:4}}>requestAnimationFrame</code> for smooth, accurate timing. Laps are colour-coded — green for fastest split, red for slowest. Works entirely in your browser with no server required.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stopwatch />);
//]]>
</script>
</body>
</html>
